<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner Setup | RCTX</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">

  <link rel="stylesheet" href="/css/owner-setup.css">
</head>
<body>

<div class="setup-container">

  <div class="header-box">
    <h1>Welcome to Your RCTX Owner Account</h1>
    <p class="intro-text">
      Thanks for claiming your business on the RCTX Directory.  
      You're just one step away from accessing your dashboard and keeping your listing up to date.
    </p>
  </div>

  <div id="businessInfo" class="biz-box">Loading business…</div>

  <form id="setupForm" class="setup-form">
    
    <label>Email</label>
    <input type="email" id="email" readonly>

    <label>Create Password</label>
    <input type="password" id="password" required placeholder="Choose a secure password">

    <button class="btn">Create Account</button>
  </form>

  <p id="statusMsg" class="status-msg"></p>

  <div class="footer-note">
    <p>
      Thank you again for joining the RCTX community —  
      <strong>Eddie</strong>
    </p>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="/js/owner-setup.js"></script>

</body>
</html>
