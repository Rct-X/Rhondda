# =========================
# BUILD
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================
# OG IMAGE FUNCTION
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================
# BUSINESS PAGE (HUMAN SPA ONLY)
# =========================
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/directory/business.html"
  status = 200

# =========================
# CATEGORY LISTING
# =========================
[[redirects]]
  from = "/directory/*"
  to = "/directory.html"
  status = 200
