# =========================
# BUILD
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================
# OG IMAGE FUNCTIONS
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================
# BUSINESS PAGE → ALWAYS GO TO OG-LISTING
# (function decides bot vs human)
# =========================
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/.netlify/functions/og-listing"
  status = 200
  force = true

# =========================
# CATEGORY LISTING (HUMAN SPA)
# =========================
[[redirects]]
  from = "/directory/:category/:town"
  to = "/directory.html"
  status = 200

[[redirects]]
  from = "/directory/:category"
  to = "/directory.html"
  status = 200
