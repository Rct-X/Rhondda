[build]
publish = "."

[functions]
directory = "netlify/functions"

[[headers]]
  for = "/js/rctx-tracker.js"

  [headers.values]
    Access-Control-Allow-Origin = "*"

[functions]
  node_bundler = "esbuild"

[kv_namespaces]
  rateLimit = "rate-limit"

[[redirects]]
from = "/robots.txt"
to = "/robots.txt"
status = 200

[[redirects]]
from = "/sitemap.xml"
to = "/sitemap.xml"
status = 200
