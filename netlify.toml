# =========================
# BUILD SETTINGS
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================
# FUNCTIONS CONFIG
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================
# CLEAN URL → OG FUNCTION
# =========================
[[redirects]]
  from = "/local/:category/:town/:slug"
  to = "/.netlify/functions/og-listing?slug=:slug"
  status = 200
  force = true

# =========================
# DIRECTORY LISTING PAGES
# =========================
[[redirects]]
  from = "/local/:category/:town"
  to = "/local.html"
  status = 200

[[redirects]]
  from = "/local/:category"
  to = "/local.html"
  status = 200
