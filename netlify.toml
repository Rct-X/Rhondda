# =========================================
# BUILD SETTINGS
# =========================================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================================
# EDGE FUNCTIONS (optional)
# =========================================
[[edge_functions]]
  function = "hello"
  path = "/hello"

# =========================================
# FUNCTION BUNDLING
# =========================================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================================
# SECURITY
# =========================================
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# =========================================
# STATIC ASSETS CACHE
# =========================================
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# =========================================
# SITEMAP
# =========================================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# =========================================
# ROBOTS
# =========================================
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================================
# ⭐ CRITICAL: OG ROUTING (THIS FIXES FACEBOOK)
# =========================================
# ALL directory pages go through OG function FIRST
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/.netlify/functions/og-listing"
  status = 200
  force = true

# =========================================
# SPA FALLBACK (HUMAN USERS)
# =========================================
[[redirects]]
  from = "/directory/*"
  to = "/directory.html"
  status = 200
  force = true
