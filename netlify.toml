[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/kv"]

[kv_namespaces]
  rateLimit = "rate-limit"

[[headers]]
  for = "/js/rctx-tracker.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
