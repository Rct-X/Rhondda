# =========================
# BUILD SETTINGS
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================
# FUNCTIONS CONFIG
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================
# BOT OG ROUTE (FACEBOOK, TWITTER, WHATSAPP, LINKEDIN)
# =========================
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/.netlify/functions/og-listing?slug=:slug"
  status = 200
  force = true
  conditions = { UserAgent = [
    "facebookexternalhit",
    "facebot",
    "facebookplatform",
    "meta-externalagent",
    "meta-externalfetcher",
    "twitterbot",
    "linkedinbot",
    "whatsapp",
    "applebot"
  ] }
# =========================
# MAIN DIRECTORY ROUTE (HUMANS)
# =========================
# THIS IS YOUR CORE PAGE LOADER
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/directory/business.html"
  status = 200
  force = true

# =========================
# DIRECTORY LISTING PAGES
# =========================
[[redirects]]
  from = "/directory/:category/:town"
  to = "/directory.html"
  status = 200

[[redirects]]
  from = "/directory/:category"
  to = "/directory.html"
  status = 200
