# =========================
# BUILD SETTINGS
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

[[redirects]]
  from = "/directory/business.html"
  to = "/directory/:category/:town/:slug"
  query = {category = ":category", town = ":town", slug = ":slug"}
  status = 301
  force = true
  
# =========================
# FUNCTIONS CONFIG
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# =========================
# ALL DIRECTORY BUSINESS PAGES → OG FUNCTION
# (Function decides bot vs human)
# =========================
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/.netlify/functions/og-listing?slug=:slug"
  status = 200
  force = true

# =========================
# DIRECTORY LISTING PAGES
# =========================
[[redirects]]
  from = "/directory/:category/:town"
  to = "/directory.html"
  status = 200

[[redirects]]
  from = "/directory/:category"
  to = "/directory.html"
  status = 200
