# =========================
# BUILD SETTINGS
# =========================
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["netlify/fonts/**"]

# =========================
# FUNCTIONS CONFIG
# =========================
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

# =========================
# SITEMAP / ROBOTS
# =========================
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# ============================================================
# 1️⃣ UGLY URL → CLEAN URL (MUST COME FIRST)
# ============================================================
[[redirects]]
  from = "/directory/business.html"
  to = "/directory/:category/:town/:slug"
  query = { category = ":category", town = ":town", slug = ":slug" }
  status = 301
  force = true

# ============================================================
# 2️⃣ CLEAN URL → OG FUNCTION (BOT/HUMAN DECIDER)
# ============================================================
[[redirects]]
  from = "/directory/:category/:town/:slug"
  to = "/.netlify/functions/og-listing?slug=:slug"
  status = 200
  force = true

# ============================================================
# 3️⃣ CATEGORY + TOWN PAGES
# ============================================================
[[redirects]]
  from = "/directory/:category/:town"
  to = "/directory.html"
  status = 200

[[redirects]]
  from = "/directory/:category"
  to = "/directory.html"
  status = 200
