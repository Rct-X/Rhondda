[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  included_files = ["netlify/fonts/**"]

# Use zisi ONLY for resvg functions
[functions."og-image"]
  node_bundler = "zisi"

[functions."og-listing"]
  node_bundler = "zisi"

[[headers]]
  for = "/js/rctx-tracker.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/og-image.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/jpeg"
    Access-Control-Allow-Origin = "*"
    Accept-Ranges = "none"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[prerender]
  enabled = true
  crawl = true
  include = [
    "/directory/*"
  ]

[[redirects]]
  from = "/directory/*"
  to = "/business.html"
  status = 200
