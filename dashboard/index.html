<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RCTX Analytics Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0b0f19;
  color:white;
  padding:2rem;
}

.card{
  background:#111827;
  padding:1.5rem;
  border-radius:14px;
  margin-bottom:1rem;
}
</style>
</head>
<body>

<h1>RCTX Analytics Dashboard</h1>

<div class="card">
  <h2>Total Visits</h2>
  <div id="totalVisits">Loading...</div>
</div>

<div class="card">
  <h2>Top Pages</h2>
  <div id="topPages"></div>
</div>

<div class="card">
  <h2>Recent Visits</h2>
  <div id="recent"></div>
</div>

<script type="module">

import { getApps, initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const response = await fetch("/.netlify/functions/firebaseConfig");
const firebaseConfig = await response.json();

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GET DATA */
const snapshot = await getDocs(collection(db, "analytics"));

document.getElementById("totalVisits").innerText =
snapshot.size + " visits";

/* TOP PAGES (basic grouping) */
const pages = {};

snapshot.forEach(doc => {
  const d = doc.data();
  pages[d.page] = (pages[d.page] || 0) + 1;
});

const topPagesEl = document.getElementById("topPages");

Object.entries(pages)
.sort((a,b) => b[1] - a[1])
.slice(0,5)
.forEach(p => {
  topPagesEl.innerHTML += `<div>${p[0]} — ${p[1]}</div>`;
});

/* RECENT */
const q = query(
  collection(db, "analytics"),
  orderBy("timestamp","desc"),
  limit(10)
);

const recent = await getDocs(q);

const recentEl = document.getElementById("recent");

recent.forEach(doc => {
  const d = doc.data();

  recentEl.innerHTML += `
    <div style="margin-bottom:10px;">
      <b>${d.clientId}</b><br>
      ${d.page}<br>
      ${d.referrer}
    </div>
  `;
});

</script>

</body>
</html>
