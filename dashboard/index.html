<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
<title>RCTX Analytics Dashboard</title>

<style>
body{
  margin:0;
  padding:2rem;
  background:#0b0f19;
  color:white;
  font-family:Arial, sans-serif;
}

h1{
  margin-bottom:2rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:1.5rem;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:1.5rem;
}

.client{
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:1rem 0;
}

.client:last-child{
  border-bottom:none;
}

.stat{
  color:#93c5fd;
  margin:.3rem 0;
}

.small{
  color:#9ca3af;
  font-size:.9rem;
}

.filters button{
  margin-right:.5rem;
  padding:.5rem 1rem;
  border:none;
  border-radius:6px;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

.filters button.active{
  background:#2563eb;
}
</style>
</head>
<body>

<h1>RCTX Analytics Dashboard</h1>

<div class="filters">
  <button onclick="setRange(1)" id="f1">Today</button>
  <button onclick="setRange(7)" id="f7">7 Days</button>
  <button onclick="setRange(30)" id="f30">30 Days</button>
</div>

<br>

<div class="analytics-actions">

  <input type="date" id="analyticsStart">
  <input type="date" id="analyticsEnd">

  <button class="btn btn-danger" onclick="deleteAnalyticsRange(false)">
    Delete Range
  </button>

  <button class="btn btn-danger" onclick="deleteAnalyticsRange(true)">
    Delete ALL
  </button>

</div>

  <div class="card">
    <h2>Total Clients</h2>
    <div id="totalClients">Loading...</div>
  </div>
</div>

<br><br>

<div class="card">
  <h2>Client Analytics</h2>
  <div id="clients"></div>
</div>

<script type="module">

// ======================================
// FIREBASE SDK
// ======================================

import "https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js";
import "https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js";

// ======================================
// FIREBASE INIT
// ======================================

async function initFirebase(){

  const res =
    await fetch("/.netlify/functions/firebaseConfig");

  const config = await res.json();

  if(!firebase.apps.length){
    firebase.initializeApp(config);
  }

  return firebase.auth();
}

let RANGE = 30;

// ======================================
// RANGE FILTER
// ======================================

window.setRange = function(days){

  RANGE = days;

  document
    .querySelectorAll(".filters button")
    .forEach(b => b.classList.remove("active"));

  document
    .getElementById("f" + days)
    ?.classList.add("active");

  renderDashboard(window.__visits || []);
};

// ======================================
// SOURCE DETECTION
// ======================================

function detectSource(referrer){

  if(!referrer || referrer === "direct"){
    return "Direct";
  }

  const r = referrer.toLowerCase();

  if(r.includes("google")) return "Google";
  if(r.includes("facebook")) return "Facebook";
  if(r.includes("instagram")) return "Instagram";
  if(r.includes("tiktok")) return "TikTok";
  if(r.includes("linkedin")) return "LinkedIn";
  if(r.includes("twitter") || r.includes("x.com")) return "X / Twitter";
  if(r.includes("whatsapp")) return "WhatsApp";
  if(r.includes("rctx.co.uk")) return "RCTX Website";

  return "Other";
}

// ======================================
// TIMESTAMP FIX
// ======================================

function getTimestamp(v){

  if(typeof v?.ts === "number"){
    return v.ts;
  }

  if(v?.timestamp?._seconds){
    return v.timestamp._seconds * 1000;
  }

  if(v?.timestamp?.toMillis){
    return v.timestamp.toMillis();
  }

  return 0;
}

// ======================================
// DATE FILTER
// ======================================

function filterByDate(visits, days){

  const now = Date.now();

  return visits.filter(v => {

    const t = getTimestamp(v);

    return t && (now - t <= days * 86400000);

  });
}

// ======================================
// DASHBOARD RENDER
// ======================================

function renderDashboard(visits){

  visits = filterByDate(visits, RANGE);

  document.getElementById("totalVisits").innerText =
    visits.length;

  const clients = {};

  visits.forEach(v => {

    const client = v.clientId || "unknown";

    if(!clients[client]){

      clients[client] = {
        total:0,
        mobile:0,
        desktop:0,
        tablet:0,
        other:0,
        pages:{},
        sources:{},
        events:{
          whatsapp:0,
          phone:0,
          form:0
        }
      };
    }

    clients[client].total++;

    // DEVICE SPLIT

    const device =
      (v.device || "").toLowerCase();

    if(device.includes("mobile")){
      clients[client].mobile++;
    }
    else if(device.includes("desktop")){
      clients[client].desktop++;
    }
    else if(device.includes("tablet")){
      clients[client].tablet++;
    }
    else{
      clients[client].other++;
    }

    // SOURCES

    const source =
      detectSource(v.referrer);

    clients[client].sources[source] =
      (clients[client].sources[source] || 0) + 1;

    // PAGES

    const page = v.page || "/";

    clients[client].pages[page] =
      (clients[client].pages[page] || 0) + 1;

    // EVENTS

    if(v.event === "whatsapp_click"){
      clients[client].events.whatsapp++;
    }

    if(v.event === "phone_tap"){
      clients[client].events.phone++;
    }

    if(v.event === "form_submit"){
      clients[client].events.form++;
    }

  });

  document.getElementById("totalClients").innerText =
    Object.keys(clients).length;

  const wrap =
    document.getElementById("clients");

  wrap.innerHTML = "";

  Object.entries(clients).forEach(([name,data]) => {

    const topPage =
      Object.entries(data.pages)
      .sort((a,b)=>b[1]-a[1])[0]?.[0] || "/";

    const mobilePercent =
      data.total
        ? Math.round((data.mobile / data.total) * 100)
        : 0;

    const topSources =
      Object.entries(data.sources)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([src,count]) =>
        `<li>${src}: ${count}</li>`
      )
      .join("");

    wrap.innerHTML += `

      <div class="client">

        <h3>${name}</h3>

        <div class="stat">
          ${data.total} visits
        </div>

        <div class="stat">
          Most viewed page: ${topPage}
        </div>

        <div class="stat">
          ${mobilePercent}% mobile users
        </div>

        <div class="stat">
          📱 ${data.mobile}
          |
          💻 ${data.desktop}
          |
          📟 ${data.tablet}
          |
          ❓ ${data.other}
        </div>

        <div class="stat">
          WhatsApp leads:
          ${data.events.whatsapp}
        </div>

        <div class="stat">
          Phone taps:
          ${data.events.phone}
        </div>

        <div class="stat">
          Form submits:
          ${data.events.form}
        </div>

        <div class="stat">
          Top traffic sources:
        </div>

        <ul class="small">
          ${topSources}
        </ul>

      </div>

    `;
  });
}

// ======================================
// INIT
// ======================================

async function init(){

  try{

    const auth =
      await initFirebase();

    auth.onAuthStateChanged(async user => {

      // NOT LOGGED IN
      if(!user){

        window.location.href = "/admin";

        return;
      }

      // ONLY YOUR EMAIL
      if(
        user.email !==
        "epickering45@googlemail.com"
      ){

        alert("Unauthorized");

        window.location.href = "/";

        return;
      }

      // GET TOKEN
      const token =
        await user.getIdToken();

      // SECURE FETCH
      const response =
        await fetch(
          "/.netlify/functions/getAnalytics",
          {
            headers:{
              Authorization:`Bearer ${token}`
            }
          }
        );

      if(!response.ok){
        throw new Error("Failed loading analytics");
      }

      const visits =
        await response.json();

      window.__visits = visits;

      renderDashboard(visits);

      document
        .getElementById("f30")
        .classList.add("active");

    });

  }catch(err){

    console.error(err);

    document.getElementById("totalVisits").innerText =
      "Error";

    document.getElementById("totalClients").innerText =
      "Error";
  }
}

init();

</script>

</body>
</html>
