<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RCTX Analytics Dashboard</title>

<style>

body{
  margin:0;
  padding:2rem;
  background:#0b0f19;
  color:white;
  font-family:Arial;
}

h1{
  margin-bottom:2rem;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:1.5rem;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:1.5rem;
}

.client{
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:1rem 0;
}

.client:last-child{
  border-bottom:none;
}

.stat{
  color:#93c5fd;
  margin:.3rem 0;
}

.small{
  color:#9ca3af;
  font-size:.9rem;
}

</style>
</head>
<body>

<h1>RCTX Analytics Dashboard</h1>

<div class="grid">

  <div class="card">
    <h2>Total Visits</h2>
    <div id="totalVisits">Loading...</div>
  </div>

  <div class="card">
    <h2>Total Clients</h2>
    <div id="totalClients">Loading...</div>
  </div>

</div>

<br><br>

<div class="card">
  <h2>Client Analytics</h2>
  <div id="clients"></div>
</div>

<script type="module">

import {
  getApps,
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

function detectSource(referrer){

  if(!referrer || referrer === "direct"){
    return "Direct";
  }

  const r = referrer.toLowerCase();

  if(r.includes("google")){
    return "Google";
  }

  if(r.includes("facebook")){
    return "Facebook";
  }

  if(r.includes("instagram")){
    return "Instagram";
  }

  if(r.includes("tiktok")){
    return "TikTok";
  }

  if(r.includes("linkedin")){
    return "LinkedIn";
  }

  if(r.includes("twitter") || r.includes("x.com")){
    return "X / Twitter";
  }

  if(r.includes("rctx.co.uk")){
    return "RCTX Website";
  }

  if(r.includes("whatsapp")){
    return "WhatsApp";
  }

  return "Other";

}

async function loadDashboard(){

  const response =
    await fetch("/.netlify/functions/firebaseConfig");

  const firebaseConfig =
    await response.json();

  const app = getApps().length
    ? getApps()[0]
    : initializeApp(firebaseConfig);

  const db = getFirestore(app);

  const snapshot =
    await getDocs(collection(db,"analytics"));

  const visits = [];

  snapshot.forEach(doc => {
    visits.push(doc.data());
  });

  // TOTAL VISITS
  document.getElementById("totalVisits")
    .innerText = visits.length;

  // GROUP CLIENTS
  const clients = {};

  visits.forEach(v => {

    const client =
      v.clientId || "unknown";

    if(!clients[client]){

      clients[client] = {
        total:0,
        mobile:0,
        google:0,
        pages:{}
        sources:{}
      };

    }

    clients[client].total++;
    const source =
  detectSource(v.referrer);

clients[client].sources[source] =
  (clients[client].sources[source] || 0) + 1;

    // MOBILE DETECTION
    const width =
      parseInt(
        (v.screen || "0x0").split("x")[0]
      );

    if(width < 768){
      clients[client].mobile++;
    }

    // PAGE COUNTS
    const page =
      v.page || "/";

    clients[client].pages[page] =
      (clients[client].pages[page] || 0) + 1;

  });

  document.getElementById("totalClients")
    .innerText =
      Object.keys(clients).length;

  // RENDER CLIENTS
  const clientsWrap =
    document.getElementById("clients");

  Object.entries(clients).forEach(([name,data]) => {

    // TOP PAGE
    let topPage = "/";
    let topCount = 0;

    Object.entries(data.pages).forEach(([page,count]) => {

      if(count > topCount){
        topPage = page;
        topCount = count;
      }

    });

    const mobilePercent =
      Math.round(
        (data.mobile / data.total) * 100
      );

    clientsWrap.innerHTML += `

      <div class="client">

        <h3>${name}</h3>

        <div class="stat">
          ${data.total} monthly visits
        </div>

        <div class="stat">
          Most viewed page:
          ${topPage}
        </div>

        <div class="stat">
          ${mobilePercent}% mobile users
        </div>
<div class="stat">
  Top traffic sources:
</div>

<ul class="small">
  ${
    Object.entries(data.sources)
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5)
      .map(([src,count]) =>
        `<li>${src}: ${count}</li>`
      )
      .join("")
  }
</ul>

      </div>

    `;

  });

}

loadDashboard();

</script>

</body>
</html>
