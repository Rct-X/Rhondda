<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | RCTX Directory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/css/admin.css">

  <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body class="admin-page">

<header class="navbar">
  <div class="container nav-flex">
    <a href="/" class="logo-wrap">
      <div class="logo">RCT<span>X</span></div>
      <div class="logo-tag">WEB DESIGN</div>
    </a>
  </div>
</header>
<section>
  <div class="admin-topbar">

  <div class="admin-title-wrap">
    <h1>RCTX Admin</h1>
    <p>Directory management, analytics and moderation</p>
  </div>

  <div class="admin-nav">

    <a href="/admin/index.html" class="admin-link">
      🏠 Dashboard
    </a>

    <a href="/admin/marketing.html" class="admin-link">
      📣 Marketing Tools
    </a>

    <a href="/admin/analytics.html" class="admin-link">
      📊 Analytics
    </a>

  </div>

  </div>
</section>
<main class="admin-container">

  <!-- LOGIN SCREEN -->
  <section id="loginSection" class="admin-card">
    <h2>Admin Login</h2>
    <input type="email" id="adminEmail" placeholder="Email">
    <input type="password" id="adminPassword" placeholder="Password">
    <button id="loginBtn" class="btn btn-primary">Login</button>
    <p id="loginMessage" class="admin-message"></p>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboardSection" class="admin-card" style="display:none;">
    <h2>Pending Submissions</h2>
    <div id="pendingList" class="pending-list"></div>
    <h2>Pending Claims</h2>
<div id="claimsList"></div>

  </section>
  <section id="pendingChangesSection">
  <h2>Pending Owner Edits</h2>
  <div id="pendingChangesList"></div>
  </section>
  
<section id="analyticsSection" class="admin-card" style="display:none;">

  <h2>Analytics Dashboard</h2>

  <div class="filters">
    <button onclick="setRange(1)" id="f1">Today</button>
    <button onclick="setRange(7)" id="f7">7 Days</button>
    <button onclick="setRange(30)" id="f30">30 Days</button>
  </div>

  <br>
<div class="analytics-actions">

  <input type="date" id="analyticsStart">

  <input type="date" id="analyticsEnd">

  <button onclick="deleteAnalyticsRange()">
    Delete Selected Range
  </button>

  <button
    onclick="deleteAllAnalytics()"
    class="danger">
    Delete ALL
  </button>

</div>
  <div class="grid">

    <div class="card">
      <h2>Page Views</h2>
      <div id="totalVisits">Loading...</div>
    </div>

    <div class="card">
      <h2>Total Clients</h2>
      <div id="totalClients">Loading...</div>
    </div>

  </div>

  <br><br>

  <div class="card">
    <h2>Client Analytics</h2>
    <div id="clients"></div>
  </div>

</section>
</main>

<script src="admin.js"></script>
</body>
</html>
