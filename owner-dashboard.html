<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owner Dashboard | RCTX</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Manage your RCTX business listing, update details, hours, logo and gallery.">

  <link rel="stylesheet" href="/css/owner-dashboard.css">
</head>
<body>

<div id="dashboard">

  <aside id="sidebar">
    <div class="sidebar-brand">
  <div class="sidebar-logo">RCTX<span>.</span></div>
  <p>Owner Dashboard</p>
</div>
    <nav>
      <button data-tab="overview">Overview</button>
      <button data-tab="details">Edit Details</button>
      <button data-tab="hours">Opening Hours</button>
      <button data-tab="logo">Logo Upload</button>
      <button data-tab="gallery">Gallery Upload</button>
      <button data-tab="preview">Preview Listing</button>
      <button id="logoutBtn">Logout</button>
    </nav>
  </aside>

  <main id="content">

    <!-- OVERVIEW -->
 <section id="tab-overview" class="tab active">

  <div class="dashboard-hero">

    <div>
      <h1 id="bizName"></h1>

      <p class="hero-sub">
        Manage your business listing
      </p>
    </div>

    <div class="hero-badge">
      <span id="bizStatus"></span>
    </div>

  </div>

  <div class="stats-grid">

    <div class="stat-card">
      <span>Category</span>
      <strong id="bizCategory"></strong>
    </div>

    <div class="stat-card">
      <span>Town</span>
      <strong id="bizTown"></strong>
    </div>

    <div class="stat-card">
      <span>Approval Status</span>
      <strong id="pendingNotice"></strong>
    </div>

  </div>

</section>

    <!-- PREVIEW -->
    <section id="tab-preview" class="tab">
      <h2>Your Listing Preview</h2>
      <div id="previewArea"></div>
    </section>

    <!-- EDIT DETAILS -->
    <section id="tab-details" class="tab">
      <h2>Edit Business Details</h2>
      <form id="detailsForm">
        <label>Name</label>
        <input id="d-name">

        <label>Description</label>
        <textarea id="d-description"></textarea>

        <label>Phone</label>
        <input id="d-phone">

        <label>Address</label>
        <input id="d-address">

        <label>Website</label>
        <input id="d-website">

        <button class="btn">Save Changes</button>
      </form>
      <p id="detailsStatus"></p>
    </section>

    <!-- HOURS -->
    <section id="tab-hours" class="tab">
      <h2>Opening Hours</h2>
      <form id="hoursForm">
        <div class="hours-grid">
          <label>Monday</label><input id="h-mon">
          <label>Tuesday</label><input id="h-tue">
          <label>Wednesday</label><input id="h-wed">
          <label>Thursday</label><input id="h-thu">
          <label>Friday</label><input id="h-fri">
          <label>Saturday</label><input id="h-sat">
          <label>Sunday</label><input id="h-sun">
        </div>
        <button class="btn">Save Hours</button>
      </form>
      <p id="hoursStatus"></p>
    </section>

    <!-- LOGO UPLOAD -->
    <section id="tab-logo" class="tab">
      <h2>Upload Logo</h2>
      <input type="file" id="logoInput" accept="image/*">
      <button id="uploadLogoBtn" class="btn">Upload Logo</button>
      <p id="logoStatus"></p>
      <img id="logoPreview" style="max-width:150px;margin-top:10px;">
    </section>

    <!-- GALLERY UPLOAD -->
    <section id="tab-gallery" class="tab">
      <h2>Upload Gallery Images</h2>
      <input type="file" id="galleryInput" accept="image/*" multiple>
      <button id="uploadGalleryBtn" class="btn">Upload Images</button>
      <p id="galleryStatus"></p>
      <div id="galleryPreview" class="gallery-grid"></div>
    </section>

  </main>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="/js/owner-dashboard.js"></script>

</body>
</html>
