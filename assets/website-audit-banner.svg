<svg xmlns="http://w3.org" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="btn-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.3" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#grid)" />

  <!-- Abstract Tech Shapes (Right Side Graphics) -->
  <g transform="translate(750, -50)">
    <!-- Glow behind the dashboard -->
    <circle cx="200" cy="250" r="180" fill="#7c3aed" opacity="0.15" filter="url(#glow)" />
    <circle cx="100" cy="200" r="130" fill="#2563eb" opacity="0.1" filter="url(#glow)" />

    <!-- Mock Browser/Dashboard Frame -->
    <rect x="0" y="100" width="380" height="240" rx="12" fill="#1e293b" stroke="#475569" stroke-width="2" />
    
    <!-- Browser Top Bar -->
    <rect x="0" y="100" width="380" height="35" rx="12" fill="#0f172a" />
    <!-- Window Controls -->
    <circle cx="20" cy="117" r="6" fill="#ef4444" />
    <circle cx="40" cy="117" r="6" fill="#f59e0b" />
    <circle cx="60" cy="117" r="6" fill="#10b981" />
    <!-- URL Bar -->
    <rect x="90" y="107" width="200" height="20" rx="10" fill="#1e293b" />
    <text x="130" y="121" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">yourwebsite.com</text>

    <!-- Dashboard Content -->
    <!-- SEO Score Ring (Speedometer Style) -->
    <circle cx="100" cy="240" r="50" fill="none" stroke="#334155" stroke-width="10" />
    <circle cx="100" cy="240" r="50" fill="none" stroke="url(#accent-grad)" stroke-width="10" stroke-dasharray="240" stroke-dashoffset="40" stroke-linecap="round" />
    
    <!-- Stacked Inside Ring Info -->
    <text x="100" y="222" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="14" text-anchor="middle">SEO</text>
    <text x="100" y="244" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="14" text-anchor="middle">Speed</text>
    <text x="100" y="266" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="14" text-anchor="middle">Trust</text>
    
    <text x="100" y="310" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">Performance</text>

    <!-- UI Checklist Lines -->
    <g transform="translate(190, 170)">
      <!-- Line 1 -->
      <circle cx="20" cy="15" r="8" fill="#10b981" opacity="0.2" />
      <path d="M 16 15 L 19 18 L 24 13" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="40" y="10" width="110" height="10" rx="5" fill="#334155" />
      
      <!-- Line 2 -->
      <circle cx="20" cy="45" r="8" fill="#10b981" opacity="0.2" />
      <path d="M 16 45 L 19 48 L 24 43" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="40" y="40" width="130" height="10" rx="5" fill="#334155" />

      <!-- Line 3 -->
      <circle cx="20" cy="75" r="8" fill="#ef4444" opacity="0.2" />
      <path d="M 16 75 L 24 75" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
      <rect x="40" y="70" width="90" height="10" rx="5" fill="#475569" />
    </g>

    <!-- Floating Code Element -->
    <g transform="translate(-60, 220)">
      <rect width="140" height="70" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9" />
      <text x="15" y="25" fill="#f472b6" font-family="monospace" font-size="11">&lt;div <tspan fill="#38bdf8">class</tspan>=<tspan fill="#e11d48">"fast"</tspan>&gt;</text>
      <text x="30" y="45" fill="#34d399" font-family="monospace" font-size="11">SEO_Optimized</text>
      <text x="15" y="60" fill="#f472b6" font-family="monospace" font-size="11">&lt;/div&gt;</text>
    </g>

    <!-- Analytics Bars -->
    <g transform="translate(290, 310)">
      <rect x="0" y="-30" width="12" height="30" rx="4" fill="#3b82f6" />
      <rect x="18" y="-50" width="12" height="50" rx="4" fill="#8b5cf6" />
      <rect x="36" y="-80" width="12" height="80" rx="4" fill="#ec4899" />
    </g>
  </g>

  <!-- Typography / Marketing Text -->
  <g transform="translate(80, 0)">
    
    <!-- Tagline / Subheading Accent -->
    <rect x="0" y="55" width="165" height="28" rx="14" fill="url(#accent-grad)" opacity="0.15" />
    <text x="15" y="74" fill="#38bdf8" font-family="system-ui, sans-serif" font-weight="700" font-size="12" letter-spacing="1.5">INSTANT WEBSITE AUDIT</text>

    <!-- Main Headline -->
    <text x="0" y="135" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="800" font-size="44" letter-spacing="-0.5">
      Get Your <tspan fill="url(#accent-grad)">Free Website Audit</tspan>
    </text>

    <!-- Description -->
    <text x="0" y="175" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18">
      Discover SEO, speed and conversion issues that could be costing you enquiries.
    </text>

    <!-- Horizontal Checklist -->
    <g transform="translate(0, 210)">
      <text x="0" y="20" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="600">✓ SEO Review</text>
      <text x="120" y="20" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="600">✓ Speed Test</text>
      <text x="240" y="20" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="600">✓ Mobile Check</text>
      <text x="370" y="20" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="600">✓ Local SEO</text>
    </g>

    <!-- CTA Button Group -->
    <g transform="translate(0, 275)">
      <!-- Linked Button Core -->
      <a href="https://rctx.co.uk/website-checker.html">
        <rect x="0" y="0" width="240" height="54" rx="27" fill="url(#btn-grad)" filter="url(#glow)" opacity="0.9" />
        <text x="120" y="32" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="16" text-anchor="middle" letter-spacing="0.5">Get My Free Audit</text>
        <!-- Arrow Icon inside Button (Maintained for design context) -->
        <path d="M 195 27 L 205 27 M 201 23 L 205 27 L 201 31" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </a>

      <!-- Secondary Info Text next to CTA -->
      <text x="265" y="22" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
        ✓ No sign-up required
      </text>
      <text x="265" y="42" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">
        ✓ Results in seconds
      </text>
    </g>
  </g>
</svg>
